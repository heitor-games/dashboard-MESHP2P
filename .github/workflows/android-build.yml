name: Gerar APK na Nuvem

on:
  push:
    branches: [ main ] # Dispara o build sempre que você enviar algo para a branch 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pegar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências e buildar o React
        run: |
          npm install
          npm run build

      - name: Sincronizar com Capacitor
        run: npx cap sync android

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compilar o APK de Debug
        run: |
          cd android
          gradlew assembleDebug

      - name: Disponibilizar o APK para download
        uses: actions/upload-artifact@v4
        with:
          name: MeuApp-P2P-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
